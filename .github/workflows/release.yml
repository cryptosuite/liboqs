name: Release builds

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS amd64
            runs_on: macos-15-intel
            target: macos-amd64
            archive_name: tar.gz
          - name: macOS arm64
            runs_on: macos-15
            target: macos-arm64
            archive_name: tar.gz
          - name: Linux amd64
            runs_on: ubuntu-latest
            target: linux-amd64
            archive_name: tar.gz
          - name: Linux arm64
            runs_on: ubuntu-24.04-arm
            target: linux-arm64
            archive_name: tar.gz
          - name: Windows amd64
            runs_on: windows-2022
            target: windows-amd64
            archive_name: zip

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build

      - name: Install macOS dependencies
        if: runner.os == 'macOS'
        run: |
          brew install ninja

      - name: Build Unix packages
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euxo pipefail

          release_id="${GITHUB_REF_NAME}"
          if [ "${GITHUB_REF_TYPE}" != "tag" ]; then
            release_id="manual-${GITHUB_RUN_NUMBER}-${GITHUB_SHA::7}"
          fi

          build_package() {
            local build_dir="$1"
            local install_dir="$2"
            local package_suffix="$3"
            local build_shared_libs="$4"

            cmake_args=(
              -S .
              -B "${build_dir}"
              -GNinja
              -DCMAKE_BUILD_TYPE=Release
              -DBUILD_SHARED_LIBS="${build_shared_libs}"
              -DOQS_BUILD_ONLY_LIB=ON
              -DOQS_DIST_BUILD=ON
              -DOQS_USE_OPENSSL=OFF
            )

            if [ "${{ runner.os }}" = "macOS" ]; then
              cmake_args+=(
                -DOQS_ENABLE_KEM_CLASSIC_MCELIECE=OFF
              )
            fi

            cmake "${cmake_args[@]}"
            cmake --build "${build_dir}" --parallel
            cmake --install "${build_dir}" --prefix "${install_dir}"

            package_root="liboqs-${release_id}-${{ matrix.target }}${package_suffix}"
            mv "${install_dir}" "${package_root}"
            cp LICENSE.txt README.md "${package_root}/"
            tar -czf "${package_root}.tar.gz" "${package_root}"
          }

          build_package build-shared install-shared "" ON
          build_package build-static install-static "-static" OFF

      - name: Build Windows packages
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $releaseId = $env:GITHUB_REF_NAME
          if ($env:GITHUB_REF_TYPE -ne "tag") {
            $releaseId = "manual-$env:GITHUB_RUN_NUMBER-$($env:GITHUB_SHA.Substring(0, 7))"
          }

          function Build-Package {
            param(
              [string] $BuildDir,
              [string] $InstallDir,
              [string] $PackageSuffix,
              [string] $BuildSharedLibs
            )

            cmake -S . -B $BuildDir `
              -G "Visual Studio 17 2022" `
              -A x64 `
              -DBUILD_SHARED_LIBS="$BuildSharedLibs" `
              -DOQS_BUILD_ONLY_LIB=ON `
              -DOQS_DIST_BUILD=OFF `
              -DOQS_OPT_TARGET=generic `
              -DOQS_USE_OPENSSL=OFF `
              -DCMAKE_INSTALL_PREFIX="$pwd\$InstallDir"

            cmake --build $BuildDir --config Release --parallel
            cmake --install $BuildDir --config Release

            $packageRoot = "liboqs-$releaseId-${{ matrix.target }}$PackageSuffix"
            Move-Item $InstallDir $packageRoot
            Copy-Item LICENSE.txt, README.md $packageRoot
            Compress-Archive -Path $packageRoot -DestinationPath "$packageRoot.zip"
          }

          Build-Package -BuildDir build-shared -InstallDir install-shared -PackageSuffix "" -BuildSharedLibs ON
          Build-Package -BuildDir build-static -InstallDir install-static -PackageSuffix "-static" -BuildSharedLibs OFF

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: liboqs-*.${{ matrix.archive_name }}
          if-no-files-found: error

  publish:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS.txt

      - name: Upload assets to GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1 || \
          gh release create "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" --title "${GITHUB_REF_NAME}" --generate-notes
          gh release upload "${GITHUB_REF_NAME}" dist/* --repo "${GITHUB_REPOSITORY}" --clobber
